name: Build R Validation Base Image

on:
  # Weekly rebuild to get security updates
  schedule:
    - cron: "0 3 * * 1"  # Monday 3 AM UTC
  # Trigger on Dockerfile or renv.lock changes
  push:
    paths:
      - "docker/r-validation/Dockerfile"
      - "renv.lock"
    branches: [main]
  pull_request:
    paths:
      - "docker/r-validation/Dockerfile"
      - "renv.lock"
    branches: [main]
  # Manual trigger
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-r-base

jobs:
  build:
    name: Build and Push R Base Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: docker/r-validation
          file: docker/r-validation/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            R_VERSION=4.4.1
            RBMI_VERSION=1.3.2
            RSTAN_VERSION=2.32.6

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: 'echo "Image published: ${{ steps.meta.outputs.tags }}"'
